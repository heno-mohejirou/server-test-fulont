<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="/load.css">
    <!-- <link rel="stylesheet" href="../static/load.css"> -->

    <link rel="icon" href="data:,">

    <title>テスト代行システム Elecitell - 完了</title>

    <style>
        .success-container {
            text-align: center;
            padding: 60px 20px;
        }

        .success-icon {
            font-size: 80px;
            color: var(--primary);
            margin-bottom: 20px;
            animation: scaleUp 0.5s ease;
        }

        .success-message {
            font-size: 24px;
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 20px;
        }

        @keyframes scaleUp {
            0% {
                transform: scale(0);
                opacity: 0;
            }

            80% {
                transform: scale(1.2);
                opacity: 1;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <header>
        <a class="logo" href="/">Elecitell</a>
        <div class="row">
            <a href="/term" class="menu">利用規約</a>
            <a href="/policy" class="menu">プライバシーポリシー</a>
            <a href="/help" class="menu">ヘルプ</a>
        </div>
    </header>

    <div class="content">
        <div class="stepper">
            <div class="step completed">
                <div class="circle">✔</div>
                <div class="label">入力</div>
            </div>

            <div class="line completed"></div>

            <div class="step current">
                <div class="circle"></div>
                <div class="label">実行</div>
            </div>

            <div class="line"></div>

            <div class="step">
                <div class="circle"></div>
                <div class="label">完了</div>
            </div>
        </div>
    </div>

    <main>
        <div class="success-icon">
            m(-_-)m
        </div>

        <div class="success-message">
            申し訳ございません
        </div>

        <p style="color: var(--text-muted); margin-bottom: 40px; font-weight: 600;">
            現在サーバが大変、混雑しております。<br>
            時間を置いて再度お試しください。
        </p>

        <div class="button-wrapper">
            <a class="Form-Btn" href="/"
                style="text-align: center; display: block; text-decoration: none;">トップページに戻る</a>
        </div> 
    </main>

    <footer>
        <div class="row">
            <a href="/term" class="menu">利用規約</a>
            <a href="/policy" class="menu">プライバシーポリシー</a>
            <a href="/help" class="menu">ヘルプ</a>
            <p>(C) Elecitell 2026 ver2.0</p>
        </div>
    </footer>
</body>

</html>
