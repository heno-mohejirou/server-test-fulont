<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>入力</title>
</head>
<body>

<h2>ログイン</h2>

<input type="text" id="username" placeholder="user">
<input type="text" id="password" placeholder="pass">
<button onclick="send()">送信</button>

<script>
async function send() {
  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  console.log("送信開始");

  const res = await fetch("https://my-worker.syousei-syousei-06-25.workers.dev/api", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ username, password })
  });

  console.log("レスポンス受信");

  const data = await res.json();
  console.log("data:", data);

  if (data.status === "loading") {
    location.href = "/load.html?username=" + username;
  } else if (data.status === "congestion") {
    location.href = "/congestion.html";
  } else if (data.status === "free") {
    location.href = "/free.html";
  } else {
    location.href = "/error.html";
  }
}
</script>

</body>
</html>
