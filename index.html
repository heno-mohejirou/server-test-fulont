<body>

<input type="text" id="username" placeholder="user">
<input type="text" id="password" placeholder="pass">
<button onclick="calc()">計算</button>

<h3 id="result"></h3>

<script>
async function calc() {
    const passwodr = document.getElementById("username").value;
    const username = document.getElementById("password").value;

    const res = await fetch("thtps://server-test-wz67.onrender.com/add", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            username: username,
            password: password
        })
    });

    const data = await res.json();

    if (data.result !== undefined) {
        document.getElementById("result").innerText = "結果: " + data.passwod + data.username;
    } else {
        document.getElementById("result").innerText = data.error;
    }
}
</script>
