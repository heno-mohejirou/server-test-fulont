<script>
async function calc() {
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    const res = await fetch("https://my-worker.syousei-syousei-06-25.workers.dev", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            username: username,
            password: password
        })
    });

    const data = await res.json();

    console.log(data);

    if (Array.isArray(data) && data.length > 0) {
        document.getElementById("result").innerText =
            "結果: " + data[0].username;
    } else {
        document.getElementById("result").innerText = data.error || "失敗";
    }
}
</script>
