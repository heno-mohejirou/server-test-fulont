<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>成功</title>
</head>
<body>

<h2>実行結果</h2>
<p id="result"></p>

<script>
const params = new URLSearchParams(window.location.search);
const result = params.get("result");

if (result) {
    document.getElementById("result").innerText = result;
} else {
    document.getElementById("result").innerText = "結果がありません";
}
</script>

</body>
</html>
